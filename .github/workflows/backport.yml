name: Backport main → develop

on:
  push:
    branches:
      - main

jobs:
  backport:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Criar branch de backport
        run: |
          git fetch origin develop
          git checkout -b backport/main-to-develop origin/develop
          git merge origin/main --no-edit || echo "CONFLICT=true" >> $GITHUB_ENV

      - name: Push do branch
        run: git push origin backport/main-to-develop --force

      - name: Abrir PR sem conflito
        if: env.CONFLICT != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: backport/main-to-develop
          base: develop
          title: "chore: backport main → develop"
          body: |
            Backport automático das mudanças da `main` para a `develop`.

            > Gerado automaticamente após merge na `main`.
          labels: backport

      - name: Abrir PR com aviso de conflito
        if: env.CONFLICT == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: backport/main-to-develop
          base: develop
          title: "⚠️ chore: backport main → develop (conflito)"
          body: |
            Backport automático das mudanças da `main` para a `develop`.

            ⚠️ **Foram detectados conflitos** — resolva manualmente antes de fazer o merge.

            > Gerado automaticamente após merge na `main`.
          labels: backport, conflict