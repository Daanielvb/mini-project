name: Release

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extrair versão
        id: version
        run: echo "VERSION=1.0.$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Permissão no Gradle
        run: chmod +x ./gradlew

      - name: Build com Gradle
        run: ./gradlew bootJar
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            danielvb/mini-project:${{ steps.version.outputs.VERSION }}
            danielvb/mini-project:latest